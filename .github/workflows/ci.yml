name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Pinned to explicit images (not the drifting -latest aliases) for reproducible runs.
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: bash version
        run: bash --version | head -1
      - name: Run test suite
        run: bash tests/run.sh

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: ShellCheck
        run: |
          shellcheck --version
          # Lint every tracked *.sh plus the extensionless git hooks — a new script can't escape the gate.
          shellcheck -x $(git ls-files '*.sh') tools/secret-guard/pre-commit tools/secret-guard/pre-push
